<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>絶対音感テスト</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin: 10px 0; }
    input { padding: 10px; font-size: 16px; width: 240px; }
    input.invalid-field, select.invalid-field {
      border: 2px solid rgba(217, 48, 37, 0.5) !important;
      background: rgba(255, 246, 246, 0.5);
      border-radius: 4px;
    }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; max-width: 520px; }
    button { padding: 14px 10px; font-size: 16px; }
    #status {
      margin: 12px 0;
      min-height: 2.6em;   /* Keep lower elements fixed regardless of status line wrapping */
      line-height: 1.3;
    }
    #status.compact {
      min-height: 1.3em;
      margin-bottom: 4px;
    }
    select { padding: 10px; font-size: 16px; }
    .keyboard {
      position: relative;
      width: min(100%, 560px);   /* Shrinks to fit viewport width */
      height: 180px;
      margin-top: 16px;
      user-select: none;
      border-radius: 10px;
      overflow: hidden;
      background: linear-gradient(180deg, #f7f7f7 0%, #ececec 100%);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    /* White keys: 7 keys, width based on percentage */
    .key.white {
      position: absolute;
      bottom: 0;
      width: calc(100% / 7);
      height: 180px;
      background: linear-gradient(180deg, #ffffff 0%, #f5f5f5 72%, #ececec 100%);
      border: 1px solid #4a4a4a;
      box-sizing: border-box;
      border-radius: 0 0 4px 4px;
      padding: 0;
      cursor: pointer;
      box-shadow: inset 0 -8px 8px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.85);
    }

    /* White-key labels: bottom */
    .key.white .label {
      position: absolute;
      left: 0; right: 0;
      bottom: 8px;
      text-align: center;
      font-size: 14px;
      color: #111;
    }

    /* Black keys: about 60% of white-key width */
    .key.black {
      position: absolute;
      top: 0;
      width: calc((100% / 7) * 0.62);
      height: 110px;
      background: linear-gradient(180deg, #3d3d3d 0%, #1e1e1e 48%, #0f0f0f 100%);
      color: white;
      z-index: 2;
      border: 1px solid #060606;
      border-radius: 0 0 6px 6px;
      padding: 0;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4), inset 0 -5px 7px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    /* Black-key labels: centered */
    .key.black .label {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      text-align: center;
      font-size: 10px;
      white-space: nowrap;
      letter-spacing: -0.02em;
      color: #fff;
    }

    /* Press highlight (toggled by JS) */
    .key.pressed.white {
      background: linear-gradient(180deg, #f1f6ff 0%, #e7eefc 100%);
      box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.12);
    }
    .key.pressed.black {
      background: linear-gradient(180deg, #5a6f8b 0%, #31445d 100%);
      border-color: #1f2d3f;
      box-shadow: inset 0 3px 10px rgba(255, 255, 255, 0.22), 0 1px 2px rgba(0, 0, 0, 0.55);
    }

    /* Disable tap highlight */
    .key { -webkit-tap-highlight-color: transparent; }
    
    /* ===== Prevent layout shifts on click/focus ===== */
    #keyboard .key{
      box-sizing: border-box;
      outline: none;              /* Prevent focus outline from shifting layout */
      border-width: 1px;          /* Keep border thickness fixed on press */
      padding: 0;                 /* Already 0, kept explicitly for safety */
      line-height: 1;             /* Avoid height jitter across fonts */
      -webkit-appearance: none; appearance: none;
    }

    #keyboard .key:focus,
    #keyboard .key:focus-visible,
    #keyboard .key:active{
      outline: none;
      box-shadow: none;           /* Prevent visual movement caused by shadow */
      transform: none;            /* Disable subtle movement on press */
    }

    #keyboard { overflow: hidden; } /* Prevent scrollbars from 1px shifts */
    
    #rowSave {max-width: 560px; }          /* Match keyboard max width */  
    #rowSave button {flex: 1 1 220px; }   /* Keep two buttons from wrapping on mobile */
    #summary { width: min(100%, 560px); margin: 10px 0 12px; }
    .result-panel { border: 1px solid #dbe4f0; background: #f7f9fc; border-radius: 12px; padding: 12px; }
    .result-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
    .kpi-card { background: #fff; border: 1px solid #e2e8f2; border-radius: 8px; padding: 8px 10px; }
    .kpi-label { font-size: 12px; color: #5f6b7a; }
    .kpi-value { font-size: 20px; font-weight: 700; color: #1f2a37; line-height: 1.1; margin-top: 2px; }
    .kpi-sub { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .insight-row { margin-top: 8px; font-size: 13px; color: #334155; }
    #labelModeChooser {
      display: none;
      width: min(100%, 560px);
      border: none;
      border-radius: 0;
      padding: 0;
      margin: 0 0 10px;
      background: transparent;
    }
    #labelModeChooser .title { font-weight: 400; margin-bottom: 6px; color: #111; }
    #labelModeChooser .opt { margin: 6px 0; display:block; color: #111; }
    </style>
</head>
<body>
  <h1>絶対音感テスト</h1>

  <div class="row">
    <label for="ID"><b>学籍番号</b></label>
    <input id="ID" type="text" placeholder="学籍番号を入力" />
  </div>
  <!-- ===== Demographics ===== -->
  <div class="row">
    <label for="sex"><b>性別</b></label>
    <select id="sex">
      <option value="">選択してください</option>
      <option value="F">F</option>
      <option value="M">M</option>
      <option value="Other">その他 / 回答しない</option>
    </select>

    <label for="age"><b>年齢</b></label>
    <input id="age" type="number" min="0" max="120" placeholder="例: 23" style="width:120px;" />
  </div>

  <!-- ===== Instruments (multiple rows) ===== -->
  <div class="row" style="align-items:flex-start;">
    <div>
      <div style="font-weight:700;margin-bottom:6px;">音楽歴</div>
      <div class="row" id="instRows" style="margin:0;">
        <div class="row instRow" style="margin:0;">
          <select class="instName">
            <option value="">選択してください</option>
            <option value="non-musician">特になし</option>
            <option value="piano">ピアノ</option>
            <option value="violin">バイオリン</option>
            <option value="flute">フルート</option>
            <option value="clarinet">クラリネット</option>
            <option value="saxophone">サクソフォン</option>
            <option value="trumpet">トランペット</option>
            <option value="trombone">トロンボーン</option>
            <option value="cello">チェロ</option>
            <option value="guitar">ギター</option>
            <option value="voice">声楽</option>
            <option value="percussion">打楽器</option>
            <option value="other">その他</option>
          </select>

          <input class="instStart" type="number" min="0" max="120" placeholder="開始年齢" style="width:120px;" />
          <input class="instEnd" type="number" min="0" max="120" placeholder="終了年齢" style="width:120px;" />
          <input class="instOther" type="text" placeholder="その他の楽器名" style="width:180px; display:none;" />
        </div>
      </div>

      <div class="row" style="margin-top:8px;">
        <button type="button" id="btnAddInst" onclick="addInstrumentRow()">+ 楽器を追加</button>
      </div>
    </div>
  </div>

  <div class="row" id="rowStart">
    <button id="btnStart">開始</button>
    <button id="btnVolPlay" disabled>音量確認を再生</button>
    <button id="btnVolOK" disabled>この音量で進む</button>
  </div>

  <div id="status">未開始</div>
  <div id="labelModeChooser">
    <div class="title">鍵盤に表示する音名を選んでください</div>
    <label class="opt"><input type="radio" name="labelMode" value="sharp" checked> C, C♯/D♭, D ...</label>
    <label class="opt"><input type="radio" name="labelMode" value="solfege"> ド, ド♯/レ♭, レ ...</label>
    <button id="btnLabelModeStart" type="button">この表記で開始</button>
  </div>

  <h2>回答</h2>
  <div id="keyboard" class="keyboard"></div><br>

  <div id="summary"></div>
  <canvas id="accChart" style="display:none; width:100%; height:220px;"></canvas>
  <canvas id="rtChart" style="display:none; width:100%; height:220px; margin-top:12px;"></canvas>
  <script src="test_jp.js" defer></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxWipBRzA83bKa1pCIMgcPT3zMoPoNCnafWDNFHNcG7jxqyWLQFYqX0BGYF8qlLJveI1A/exec";
    
    async function sendDataToGAS({ ID, test, payload }) {
      const body = {
        ID,
        test,
        payload,
        userAgent: navigator.userAgent,
        clientTimeISO: new Date().toISOString(),
      };

      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify(body),
        });

      
        return res.ok;
      } catch (e) {
        return false;
      }
    }
  </script>
</body>
</html>
